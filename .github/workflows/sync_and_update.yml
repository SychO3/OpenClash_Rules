name: Sync upstream rules and update Telegram DC

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync rule/ from upstream mirror
        run: |
          BASE="https://api.asailor.org/Custom_OpenClash_Rules/main"

          sync_dir() {
            local remote_path="$1"
            local local_path="$2"
            mkdir -p "$local_path"
            curl -sf "$BASE/$remote_path/" | \
              grep -oP '(?<=href=")[^"]+(?=")' | \
              grep -v '^\.\.\/$' | \
              grep -v '/$' | \
              while read -r file; do
                local decoded
                decoded=$(printf '%b' "$(echo "$file" | sed 's/%\([0-9A-Fa-f][0-9A-Fa-f]\)/\\x\1/g')")
                curl -sf "$BASE/$remote_path/$file" -o "$local_path/$decoded"
              done
          }

          sync_subdir() {
            local remote_path="$1"
            local local_path="$2"
            mkdir -p "$local_path"
            curl -sf "$BASE/$remote_path/" | \
              grep -oP '(?<=href=")[^"]+(?=")' | \
              grep -v '^\.\.\/$' | \
              grep '/$' | \
              while read -r subdir; do
                local decoded
                decoded=$(printf '%b' "$(echo "$subdir" | sed 's/%\([0-9A-Fa-f][0-9A-Fa-f]\)/\\x\1/g' | sed 's/\/$//')")
                sync_dir "$remote_path/$subdir" "$local_path/$decoded"
                curl -sf "$BASE/$remote_path/$subdir" | \
                  grep -oP '(?<=href=")[^"]+(?=")' | \
                  grep -v '^\.\.\/$' | \
                  grep '/$' | \
                  while read -r nested; do
                    local nested_decoded
                    nested_decoded=$(printf '%b' "$(echo "$nested" | sed 's/%\([0-9A-Fa-f][0-9A-Fa-f]\)/\\x\1/g' | sed 's/\/$//')")
                    mkdir -p "$local_path/$decoded/$nested_decoded"
                    sync_dir "$remote_path/${subdir}${nested}" "$local_path/$decoded/$nested_decoded"
                  done
              done
          }

          rm -rf rule
          mkdir -p rule
          sync_dir "rule" "rule"
          sync_subdir "rule" "rule"

      - name: Update Telegram DC rules
        run: |
          get_prefixes() {
            whois -h whois.radb.net -- "-i origin AS${1}" 2>/dev/null | grep "^route:" | awk '{print $2}' | sort -u
          }
          get_prefixes_v6() {
            whois -h whois.radb.net -- "-i origin AS${1}" 2>/dev/null | grep "^route6:" | awk '{print $2}' | sort -u
          }

          generate_rule() {
            local outfile="$1"
            shift
            local tmpfile=$(mktemp)
            for asn in "$@"; do
              for p in $(get_prefixes "$asn"); do echo "IP-CIDR,$p,no-resolve" >> "$tmpfile"; done
              for p in $(get_prefixes_v6 "$asn"); do echo "IP-CIDR6,$p,no-resolve" >> "$tmpfile"; done
            done
            # Aggregate with helper script to remove redundant subnets
            python3 py/aggregate_cidr.py "$tmpfile" > "$outfile"
            rm -f "$tmpfile"
          }

          generate_rule rule/Telegram_US.yaml 59930
          generate_rule rule/Telegram_EU.yaml 62041 211157
          generate_rule rule/Telegram_Asia.yaml 62014 44907

      - name: Validate Telegram rules
        run: |
          for f in rule/Telegram_US.yaml rule/Telegram_EU.yaml rule/Telegram_Asia.yaml; do
            if [ ! -s "$f" ] || ! grep -q "IP-CIDR" "$f"; then
              echo "ERROR: $f is empty or invalid"
              exit 1
            fi
            echo "OK: $f ($(grep -c CIDR "$f") rules)"
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rule/
          if ! git diff --cached --quiet; then
            git commit -m "Sync rules and update Telegram DC at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          else
            echo "No changes."
          fi
